server:
  port: 8080

# 数据库配置
spring:
  datasource:
    url: jdbc:mysql://prod-db:3306/temple-system?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: prod-user
    password: prod-password
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: prod-redis
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 5

# 日志配置
logging:
  level:
    root: warn
    dev.cj.temple: info
    org.springframework.web: warn
    org.hibernate: warn

security:
  ignore-urls:
    - /auth/**